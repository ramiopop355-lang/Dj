name: Build Sigma Android AAB

on:
  push:
    branches: [main, master]
    paths:
      - "twa-android/**"
      - "twa-source/sigma-release.keystore.enc"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Decrypt signing keystore
        run: |
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
            -in twa-source/sigma-release.keystore.enc \
            -out twa-android/sigma-release.keystore \
            -pass pass:"SigmaBac2026!"
          echo "Keystore OK ($(stat -c%s twa-android/sigma-release.keystore) bytes)"

      - name: Build signed AAB
        working-directory: twa-android
        env:
          SIGMA_STORE_PASSWORD: "SigmaBac2026!"
          SIGMA_KEY_PASSWORD: "SigmaBac2026!"
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease --no-daemon --stacktrace
          echo "=== Output files ==="
          find app/build/outputs -type f

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sigma-android-aab
          path: twa-android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

      - name: Build summary
        if: success()
        run: |
          echo "## ✅ Sigma Android Build" >> $GITHUB_STEP_SUMMARY
          echo "Download **sigma-android-aab** artifact above, then upload \`app-release.aab\` to Google Play Console → Internal Testing." >> $GITHUB_STEP_SUMMARY
