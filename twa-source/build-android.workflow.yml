name: Build Sigma Android AAB

on:
  push:
    branches: [main, master]
    paths:
      - "twa-android/**"
      - "twa-source/sigma-release.keystore.enc"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;33.0.2 platforms;android-33 platform-tools"

      - name: Decrypt signing keystore
        env:
          KEYSTORE_DECRYPT_PASSWORD: ${{ secrets.KEYSTORE_DECRYPT_PASSWORD || 'SigmaBac2026!' }}
        run: |
          if [ ! -f twa-source/sigma-release.keystore.enc ]; then
            echo "::error::Encrypted keystore is missing"
            exit 1
          fi
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
            -in twa-source/sigma-release.keystore.enc \
            -out twa-android/sigma-release.keystore \
            -pass pass:"$KEYSTORE_DECRYPT_PASSWORD"
          echo "Keystore decrypted ($(wc -c < twa-android/sigma-release.keystore) bytes)"

      - name: Build signed AAB
        working-directory: twa-android
        env:
          SIGMA_KEYSTORE_PATH: ./sigma-release.keystore
          SIGMA_STORE_PASSWORD: ${{ secrets.KEYSTORE_DECRYPT_PASSWORD || 'SigmaBac2026!' }}
          SIGMA_KEY_PASSWORD: ${{ secrets.KEYSTORE_DECRYPT_PASSWORD || 'SigmaBac2026!' }}
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease --no-daemon --stacktrace
          echo "---ARTIFACTS---"
          find app/build/outputs -type f -name "*.aab" -o -name "*.apk"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: sigma-android-release
          path: |
            twa-android/app/build/outputs/bundle/release/app-release.aab
            twa-android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Build summary
        if: always()
        run: |
          echo "## Sigma Android Build" >> $GITHUB_STEP_SUMMARY
          echo "Download \`sigma-android-release\` artifact above and upload \`app-release.aab\` to Google Play Console." >> $GITHUB_STEP_SUMMARY
