name: Build Sigma Android AAB

on:
  push:
    branches: [master, main]
    paths:
      - "twa-source/**"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;34.0.0 platforms;android-34 platform-tools tools"

      - name: Verify Android SDK structure for Bubblewrap
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la "$ANDROID_HOME"
          # Bubblewrap looks for build-tools/, platform-tools/, platforms/, and tools/
          for d in build-tools platform-tools platforms tools; do
            if [ ! -d "$ANDROID_HOME/$d" ]; then
              echo "::warning::Missing $ANDROID_HOME/$d — creating from cmdline-tools if possible"
              if [ "$d" = "tools" ] && [ -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
                ln -s "$ANDROID_HOME/cmdline-tools/latest" "$ANDROID_HOME/tools"
              fi
            fi
            ls -la "$ANDROID_HOME/$d" 2>/dev/null | head -3 || echo "  (still missing)"
          done

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@1.21.0

      - name: Configure Bubblewrap (non-interactive)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "--- bubblewrap config ---"
          cat ~/.bubblewrap/config.json
          echo ""
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Decrypt signing keystore
        env:
          KEYSTORE_DECRYPT_PASSWORD: ${{ secrets.KEYSTORE_DECRYPT_PASSWORD || 'SigmaBac2026!' }}
        run: |
          if [ ! -f twa-source/sigma-release.keystore.enc ]; then
            echo "::error::Encrypted keystore file twa-source/sigma-release.keystore.enc is missing from the repo."
            exit 1
          fi
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
            -in twa-source/sigma-release.keystore.enc \
            -out twa-source/sigma-release.keystore \
            -pass pass:"$KEYSTORE_DECRYPT_PASSWORD"
          echo "Keystore decrypted successfully ($(wc -c < twa-source/sigma-release.keystore) bytes)."

      - name: Print SHA-256 fingerprint
        env:
          KEYSTORE_DECRYPT_PASSWORD: ${{ secrets.KEYSTORE_DECRYPT_PASSWORD || 'SigmaBac2026!' }}
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "  Signing certificate SHA-256 (already in assetlinks.json)"
          echo "════════════════════════════════════════════════════════════════"
          keytool -list -v \
            -keystore twa-source/sigma-release.keystore \
            -alias sigma \
            -storepass "$KEYSTORE_DECRYPT_PASSWORD" \
            2>/dev/null | grep "SHA256:" | sed 's/^[ \t]*//'
          echo "════════════════════════════════════════════════════════════════"
          echo ""

      - name: Build signed AAB and APK
        working-directory: twa-source
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_DECRYPT_PASSWORD || 'SigmaBac2026!' }}
          KEY_PASS: ${{ secrets.KEYSTORE_DECRYPT_PASSWORD || 'SigmaBac2026!' }}
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath ./sigma-release.keystore \
            --signingKeyAlias sigma \
            --ksPassword "$STORE_PASS" \
            --keyPassword "$KEY_PASS"
          echo "---ARTIFACTS---"
          ls -la *.aab *.apk 2>/dev/null || true

      - name: Upload AAB + APK
        uses: actions/upload-artifact@v4
        with:
          name: sigma-android-release
          path: |
            twa-source/app-release-bundle.aab
            twa-source/app-release-signed.apk
          if-no-files-found: error
          retention-days: 90

      - name: Summary
        if: always()
        run: |
          echo "## Sigma Android Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the AAB from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Download \`sigma-android-release\` artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Upload \`app-release-bundle.aab\` to Google Play Console → Production → Create release" >> $GITHUB_STEP_SUMMARY
